name: CI

on: [push, pull_request]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd core
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd core
          python -m pytest ../tests -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd apps/desktop
          npm ci
      - name: Type check
        run: |
          cd apps/desktop
          npx tsc --noEmit
      - name: Build
        run: |
          cd apps/desktop
          npm run build
