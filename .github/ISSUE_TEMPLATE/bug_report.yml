name: Bug Report
description: Report something broken
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve HANTER!"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Run '...'\n2. Click '...'\n3. See error"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 22.04"
  - type: input
    id: ram
    attributes:
      label: RAM
      placeholder: "e.g. 4GB, 8GB, 16GB"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
