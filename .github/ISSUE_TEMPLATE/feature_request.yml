name: Feature Request
description: Suggest an idea
title: "[FEATURE] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "Help make HANTER better!"
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Agent System
        - UI / Dashboard
        - Memory / Storage
        - Skill System
        - Performance
        - Documentation
        - Other
